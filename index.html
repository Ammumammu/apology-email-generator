<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApologyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .button {
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .button:hover {
            background-color: #4f46e5;
        }
        input {
            background-color: #0f172a;
            color: #ffffff;
            border: 1px solid #6366f1;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 1rem;
        }
        textarea {
            background-color: #0f172a;
            color: #ffffff;
            border: 1px solid #6366f1;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 1rem;
            width: 100%;
            height: 100px;
            margin-bottom: 1rem;
        }
        select {
            background-color: #0f172a;
            color: #ffffff;
            border: 1px solid #6366f1;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 1rem;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script>
    const CONFIG = {
        GROQ_KEY: 'CONFIG.GROQ_KEY',
        SUPABASE_ANON_KEY: 'your-supabase-anon-key',
        SUPABASE_URL: 'https://your-supabase-url.supabase.co'
    };

    const posthog = {
        capture: (event) => {
            console.log('PostHog event:', event);
            // Implement PostHog capture logic here
        }
    };

    const supabase = {
        from: (table) => ({
            insert: (data) => {
                console.log('Supabase insert:', table, data);
                // Implement Supabase insert logic here
            }
        })
    };

    const App = () => {
        const [view, setView] = React.useState('landing');
        const [issue, setIssue] = React.useState('');
        const [template, setTemplate] = React.useState('default');
        const [email, setEmail] = React.useState('');
        const [usageCount, setUsageCount] = React.useState(0);
        const [generatedEmail, setGeneratedEmail] = React.useState('');

        const templates = [
            { value: 'default', label: 'Default Template' },
            { value: 'formal', label: 'Formal Template' },
            { value: 'casual', label: 'Casual Template' }
        ];

        const handleGenerateEmail = async () => {
            if (usageCount >= 1 && !localStorage.getItem('paidUser')) {
                setView('paywall');
                posthog.capture('free_limit_hit');
                return;
            }
            posthog.capture('tool_used');
            const response = await fetch('https://api.groq.com/v1/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                },
                body: JSON.stringify({
                    model: 'llama3-70b',
                    prompt: `Generate a professional apology email for the following issue: ${issue}. Use the ${template} template.`,
                    max_tokens: 200
                })
            });
            const data = await response.json();
            const generatedContent = data.choices[0].text.trim();
            setGeneratedEmail(`${generatedContent}\n\nGenerated by ApologyPro — apology-email-generator.vercel.app`);
            setUsageCount(prev => prev + 1);
            localStorage.setItem('usageCount', usageCount + 1);
        };

        const handleCaptureEmail = () => {
            posthog.capture('email_captured');
            supabase.from('leads').insert({ email, usage_count: usageCount });
            setUsageCount(prev => prev + 3);
            localStorage.setItem('usageCount', usageCount + 3);
            setView('tool');
        };

        React.useEffect(() => {
            const count = localStorage.getItem('usageCount') || 0;
            setUsageCount(count);
            posthog.capture('tool_opened');
        }, []);

        return (
            <div className="container">
                {view === 'landing' && (
                    <>
                        <h1>Relationships on the Line</h1>
                        <p>HR Managers, stop wasting time crafting apology emails. ApologyPro generates professional apologies in seconds, giving you back valuable time for growth and employee satisfaction.</p>
                        <p><strong>How it works:</strong> Step 1: Share the issue (5 seconds) → Step 2: Choose a template (10 seconds) → Result: A heartfelt apology email (instant)</p>
                        <button className="button" onClick={() => setView('tool')}>Generate a professional apology email now</button>
                    </>
                )}
                {view === 'tool' && (
                    <>
                        <h2>Generate Your Apology Email</h2>
                        <textarea value={issue} onChange={(e) => setIssue(e.target.value)} placeholder="Describe the issue here..."></textarea>
                        <select value={template} onChange={(e) => setTemplate(e.target.value)}>
                            {templates.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                        </select>
                        <button className="button" onClick={handleGenerateEmail}>Generate Email</button>
                        {generatedEmail && (
                            <div>
                                <h3>Generated Email:</h3>
                                <p>{generatedEmail}</p>
                            </div>
                        )}
                    </>
                )}
                {view === 'paywall' && (
                    <>
                        <h2>Upgrade to ApologyPro</h2>
                        <p>You've used your free limit. Upgrade to get unlimited access.</p>
                        <p>Get <strong>14 days free</strong> then $14/mo.</p>
                        <button className="button" onClick={() => {
                            posthog.capture('payment_clicked');
                            window.location.href = 'https://buy.stripe.com/placeholder-apology-email-generator';
                        }}>Upgrade Now</button>
                        <p>Or try for free with your email:</p>
                        <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Enter your email..."></input>
                        <button className="button" onClick={handleCaptureEmail}>Get 3 More Free Uses</button>
                    </>
                )}
            </div>
        );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
